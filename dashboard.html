<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EndoSuite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .expanded-content { display: none; }
        .is-expanded + .expanded-content { display: table-row; }
        
        .is-expanded .chevron-icon { transform: rotate(180deg); }
        .chevron-icon { transition: transform 0.3s ease; }
        
        /* Switch styling */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #0f766e; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Drawer transition */
        #registrationDrawer { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-100 text-gray-900 min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-teal-900 text-white p-4 shadow-md">
        <div class="absolute inset-0 overflow-hidden z-0">
            <svg class="absolute top-0 right-0 w-64 h-full opacity-10 pointer-events-none" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M200 0C100 0 50 100 0 200" stroke="white" stroke-width="40" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="container mx-auto flex justify-between items-center px-4 max-w-7xl relative z-10">
            <h1 class="text-2xl font-semibold tracking-tight">EndoSuite</h1>
            <div class="relative">
                <button id="userMenuBtn" class="p-2 rounded-full hover:bg-teal-800 transition focus:outline-none">
                    <svg class="w-8 h-8 text-teal-200" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </button>
                <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white text-gray-700 rounded-lg shadow-xl border border-gray-100 py-1 z-[100]">
                    <a href="template_editor.html" class="block px-4 py-2 text-sm hover:bg-slate-50">Template Editor</a>
                    <a href="#" class="block px-4 py-2 text-sm hover:bg-slate-50">Medicines</a>
                    <a href="#" class="block px-4 py-2 text-sm hover:bg-slate-50">Settings</a>
                    <hr class="my-1">
                    <a href="index.html" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">Sign Out</a>
                    <button onclick="closeApp()" class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-red-50">Close Application</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-7xl mt-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">Patients</h2>
            <button onclick="toggleDrawer(true)" class="bg-teal-700 hover:bg-teal-600 px-5 py-2.5 rounded-lg text-sm font-medium text-white transition shadow-lg flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Patient
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-600 uppercase text-[10px] font-bold tracking-wider">
                    <tr>
                        <th class="p-4 pl-6">MRN / First Visit</th>
                        <th class="p-4">Patient Name / ID</th>
                        <th class="p-4">Age / Sex</th>
                        <th class="p-4">Mobile No.</th>
                        <th class="p-4">Last Procedure</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="patient-list">
                    <tr class="border-b hover:bg-slate-50 cursor-pointer transition-colors" onclick="this.classList.toggle('is-expanded')">
                        <td class="p-4 pl-6 flex items-center gap-3">
                            <svg class="w-4 h-4 text-gray-400 chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            <div>
                                <div class="font-bold text-gray-900">MRN-0001</div>
                                <div class="text-xs text-gray-400">12 Jan 2026</div>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="font-bold text-gray-900">John Doe</div>
                            <div class="text-xs text-gray-400">ID-9982</div>
                        </td>
                        <td class="p-4">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium">45</span>
                                <span class="inline-flex items-center justify-center w-6 h-6 text-[10px] font-bold bg-blue-100 text-blue-800 rounded">M</span>
                            </div>
                        </td>
                        <td class="p-4 text-sm text-gray-600 font-mono">0123456789</td>
                        <td class="p-4">
                            <div class="font-medium text-gray-900">Gastroscopy</div>
                            <div class="text-xs text-gray-400">15 Jun 2026</div>
                        </td>
                        <td class="p-4">
                            <label class="switch">
                                <input type="checkbox">
                                <span class="slider"></span>
                            </label>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="drawerOverlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleDrawer(false)"></div>
    
    <!-- Registration Drawer -->
    <div id="registrationDrawer" class="fixed right-0 top-0 h-full w-full max-w-sm bg-white shadow-2xl z-[60] translate-x-full flex flex-col">
        <div class="p-3 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-sm font-bold text-gray-900">Register Patient</h2>
            <button onclick="toggleDrawer(false)" class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-2 text-xs">
            <div>
                <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>
                    MRN No.
                </label>
                <input type="text" id="mrnField" disabled class="w-full bg-slate-100 border border-slate-200 rounded p-1 text-gray-500 font-mono">
            </div>
            <div>
                <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Patient Name *
                </label>
                <input type="text" id="patientName" required class="w-full border border-slate-200 rounded p-1">
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Age *
                    </label>
                    <input type="number" id="age" required class="w-full border border-slate-200 rounded p-1">
                </div>
                <div class="col-span-2">
                    <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        Sex *
                    </label>
                    <div class="flex gap-1">
                        <label class="flex-1 flex items-center justify-center border border-slate-200 rounded py-1 font-medium cursor-pointer has-[:checked]:bg-teal-50 has-[:checked]:border-teal-500 text-[10px]">
                            <input type="radio" name="sex" value="M" class="hidden">Male
                        </label>
                        <label class="flex-1 flex items-center justify-center border border-slate-200 rounded py-1 font-medium cursor-pointer has-[:checked]:bg-teal-50 has-[:checked]:border-teal-500 text-[10px]">
                            <input type="radio" name="sex" value="F" class="hidden">Female
                        </label>
                        <label class="flex-1 flex items-center justify-center border border-slate-200 rounded py-1 font-medium cursor-pointer has-[:checked]:bg-teal-50 has-[:checked]:border-teal-500 text-[10px]">
                            <input type="radio" name="sex" value="O" class="hidden">Other
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Mobile No. *
                </label>
                <input type="tel" id="mobile" required class="w-full border border-slate-200 rounded p-1">
            </div>

            <div>
                <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Email
                </label>
                <input type="email" class="w-full border border-slate-200 rounded p-1">
            </div>

            <div>
                <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Address
                </label>
                <textarea class="w-full border border-slate-200 rounded p-1 h-8"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Physician
                    </label>
                    <input type="text" class="w-full border border-slate-200 rounded p-1">
                </div>
                <div>
                    <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                        Internal Ref ID
                    </label>
                    <input type="text" class="w-full border border-slate-200 rounded p-1">
                </div>
            </div>

            <div>
                <label class="block font-bold text-gray-500 uppercase tracking-wider mb-0.5 flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    ABHA ID
                </label>
                <input type="text" class="w-full border border-slate-200 rounded p-1">
            </div>
        </div>

        <div class="p-3 border-t flex gap-2">
            <button onclick="toggleDrawer(false)" class="flex-1 border border-slate-200 py-2 rounded font-bold text-slate-600 hover:bg-slate-50 transition">Cancel</button>
            <button onclick="registerPatient()" class="flex-1 bg-teal-900 text-white py-2 rounded font-bold hover:bg-teal-800 transition">Register</button>
        </div>
    </div>

    <script>
        const userMenuBtn = document.getElementById('userMenuBtn');
        const userMenuDropdown = document.getElementById('userMenuDropdown');
        const drawer = document.getElementById('registrationDrawer');
        const overlay = document.getElementById('drawerOverlay');
        let mrnCounter = 2;

        userMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userMenuDropdown.classList.toggle('hidden');
        });

        window.addEventListener('click', () => {
            if (!userMenuDropdown.classList.contains('hidden')) userMenuDropdown.classList.add('hidden');
        });

        function toggleDrawer(isOpen) {
            if (isOpen) {
                document.getElementById('mrnField').value = `MRN-000${mrnCounter}`;
                drawer.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                drawer.classList.add('translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function registerPatient() {
            const name = document.getElementById('patientName').value;
            const age = document.getElementById('age').value;
            const sex = document.querySelector('input[name="sex"]:checked')?.value || 'N/A';
            const mobile = document.getElementById('mobile').value;
            const mrn = document.getElementById('mrnField').value;

            if(!name || !age || !mobile) {
                alert("Please fill in all mandatory fields.");
                return;
            }

            const table = document.getElementById('patient-list');
            const row = document.createElement('tr');
            row.className = "border-b hover:bg-slate-50 cursor-pointer transition-colors";
            row.innerHTML = `
                <td class="p-4 pl-6 flex items-center gap-3">
                    <svg class="w-4 h-4 text-gray-400 chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    <div>
                        <div class="font-bold text-gray-900">${mrn}</div>
                        <div class="text-xs text-gray-400">${new Date().toLocaleDateString()}</div>
                    </div>
                </td>
                <td class="p-4">
                    <div class="font-bold text-gray-900">${name}</div>
                    <div class="text-xs text-gray-400">ID-${Math.floor(Math.random()*10000)}</div>
                </td>
                <td class="p-4">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-medium">${age}</span>
                        <span class="inline-flex items-center justify-center w-6 h-6 text-[10px] font-bold bg-blue-100 text-blue-800 rounded">${sex}</span>
                    </div>
                </td>
                <td class="p-4 text-sm text-gray-600 font-mono">${mobile}</td>
                <td class="p-4">
                    <div class="text-xs text-gray-400">No procedures yet</div>
                </td>
                <td class="p-4">
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </td>
            `;
            table.appendChild(row);
            
            mrnCounter++;
            toggleDrawer(false);
            // Reset form
            document.getElementById('patientName').value = '';
            document.getElementById('age').value = '';
            document.getElementById('mobile').value = '';
            document.querySelectorAll('input[name="sex"]').forEach(r => r.checked = false);
        }

        function closeApp() {
            localStorage.clear();
            document.body.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen text-gray-800">
                    <h1 class="text-4xl font-bold text-teal-900">Session Closed</h1>
                    <p class="text-gray-500 mt-4 text-center">Your EndoSuite session has been terminated safely.<br>Please refresh the page to sign in again.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
