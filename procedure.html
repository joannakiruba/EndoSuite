<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Procedure</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0d1117;
}
</style>

</head>

<body class="bg-[#0d1117] text-white min-h-screen">

<!-- HEADER -->

<header class="bg-zinc-900 border-b border-zinc-800 px-8 py-4">

    <div class="flex items-center justify-between">

        <!-- Left -->
        <div class="flex items-center gap-8">

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    Patient
                </p>
                <p class="text-base font-semibold">
                    John Doe
                </p>
            </div>

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    Age / Sex
                </p>
                <p class="text-sm text-zinc-300">
                    52 Years • Male
                </p>
            </div>

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    MRN no.
                </p>
                <p class="text-sm text-zinc-300">
                    MRN-0001
                </p>
            </div>

        </div>


        <!-- Center Timer -->

        <div class="absolute left-1/2 -translate-x-1/2">

            <div
                class="bg-zinc-800 border border-zinc-700 rounded-lg px-5 py-1.5 shadow">

                <span id="timer"
                      class="font-mono text-lg font-semibold tracking-[0.15em] text-emerald-400">
                    00:00:00
                </span>

            </div>

        </div>


        <!-- Right -->

        <div class="flex items-center gap-3">

            <a href="annotate.html"
            class="inline-flex items-center px-3 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 transition text-sm font-medium text-white">
                Annotate
            </a>

            <a href="dashboard.html"
               class="px-3 py-1.5 rounded-lg bg-zinc-600 border border-zinc-700 hover:bg-zinc-700 transition text-sm font-medium">

                Return to Dashboard

            </a>

        </div>

    </div>

</header>

<script>

let elapsedSeconds = 0;

const timer = document.getElementById("timer");

function updateTimer(){

    elapsedSeconds++;

    const hrs = String(Math.floor(elapsedSeconds/3600)).padStart(2,"0");

    const mins = String(Math.floor((elapsedSeconds%3600)/60)).padStart(2,"0");

    const secs = String(elapsedSeconds%60).padStart(2,"0");

    timer.textContent = `${hrs}:${mins}:${secs}`;

}

// reset every page load
timer.textContent = "00:00:00";

// start immediately
setInterval(updateTimer,1000);

</script>

<!-- MAIN CONTENT -->

<main class="flex gap-5 p-5 h-[calc(100vh-90px)]">

    <!-- Live Feed -->

    <div
        class="w-2/3 h-[calc(100vh-105px)] bg-black border border-zinc-800 rounded-xl overflow-hidden shadow-2xl relative">

        <!-- Placeholder -->

        <div
            class="absolute inset-0 flex items-center justify-center">

            <div class="text-center">

                <!-- Camera Icon -->

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-16 h-16 mx-auto mb-4 text-zinc-700"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">

                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="1.5"
                          d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14m-9 5h8a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z"/>

                </svg>

                <p class="text-2xl font-semibold text-zinc-500">
                    Live Feed
                </p>

                <p class="text-sm text-zinc-600 mt-2">
                    Camera preview will appear here
                </p>

            </div>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="w-1/3 h-[calc(100vh-105px)] relative">

        <!-- Scope Dropdown (Top Right) -->

        
        <div class="absolute top-0">
            <div class="relative">
                <select
                    id="procedureSelector"
                    class="flex items-center justify-between w-72 px-3 py-1.5 rounded-lg bg-zinc-800 border border-zinc-700 hover:bg-zinc-700 text-sm text-white">

                    <option value="" selected disabled>
                        Select Procedure
                    </option>

                    <option>Gastroscopy</option>
                    <option>Colonoscopy</option>
                    <option>ERCP</option>
                    <option>Sigmoidoscopy</option>
                    <option>Bronchoscopy</option>
                    <option>Capsule Endoscopy</option>
                    <option>Endoscopic Ultrasound (EUS)</option>
                    <option>Stent Placement</option>

                </select>
            </div>
        </div>

        <div class="absolute top-0 right-0">

            <div class="relative">

                <button id="scopeBtn"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-zinc-800 border border-zinc-700 hover:bg-zinc-700 text-sm">

                        Scope

                        <svg id="scopeArrow"
                            class="w-4 h-4 transition-transform duration-200"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24">

                            <path stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M19 9l-7 7-7-7"/>

                        </svg>

                    </button>

                <div id="scopeMenu"
                    class="hidden absolute right-0 mt-2 w-72 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl overflow-hidden z-50">

                    <div class="px-4 py-2 text-xs uppercase tracking-wider text-zinc-500 border-b border-zinc-800">
                        Default Scopes
                    </div>

                    <button class="w-full flex justify-between px-4 py-2 text-sm hover:bg-zinc-800">
                        <span>○ Circle (Small)</span>
                        <span class="text-zinc-500">1</span>
                    </button>

                    <button class="w-full flex justify-between px-4 py-2 text-sm hover:bg-zinc-800">
                        <span>○ Circle (Large)</span>
                        <span class="text-zinc-500">2</span>
                    </button>

                    <button class="w-full flex justify-between px-4 py-2 text-sm hover:bg-zinc-800">
                        <span>▭ Rectangle (4:3)</span>
                        <span class="text-zinc-500">3</span>
                    </button>

                    <button class="w-full flex justify-between px-4 py-2 text-sm hover:bg-zinc-800">
                        <span>▭ Rectangle (16:9)</span>
                        <span class="text-zinc-500">4</span>
                    </button>

                    <button class="w-full flex justify-between px-4 py-2 text-sm hover:bg-zinc-800">
                        <span>▭ Square</span>
                        <span class="text-zinc-500">5</span>
                    </button>

                    <div class="border-t border-zinc-800 p-2">

                        <button
                            class="w-full py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-sm font-medium">

                            + Create New Scope

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- Media Review Panel -->

        <div class="mt-12 bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">

            <!-- Tabs -->

            <div class="flex border-b border-zinc-800">

                <button
                    id="imagesTab"
                    onclick="switchMediaTab('images')"
                    class="media-tab flex-1 px-4 py-3 text-sm font-medium bg-zinc-800 text-white">
                    Images
                </button>

                <button
                    id="videosTab"
                    onclick="switchMediaTab('videos')"
                    class="media-tab flex-1 px-4 py-3 text-sm text-zinc-400 hover:text-white">
                    Videos
                </button>

                <button
                    id="binTab"
                    onclick="switchMediaTab('bin')"
                    class="media-tab flex-1 px-4 py-3 text-sm text-zinc-400 hover:text-white">
                    Bin
                </button>

            </div>

            <!-- Content Area -->

            <div class="h-60 bg-black p-4 overflow-y-auto">

                <!-- Images -->

                <div id="imagesContent">

                    <div class="h-40 bg-black flex items-center justify-center">

                        <p class="text-zinc-500 text-sm">
                            No media captured
                        </p>

                    </div>

                </div>

                <!-- Videos -->

                <div id="videosContent" class="hidden">

                    <div class="h-40 bg-black flex items-center justify-center">

                        <p class="text-zinc-500 text-sm">
                            No media captured
                        </p>

                    </div>

                </div>

                <!-- Bin -->

                <div id="binContent" class="hidden">

                    <div class="h-full flex items-center justify-center text-zinc-500 text-sm">

                        Deleted media will appear here

                    </div>

                </div>

            </div>

            <!-- Footer Actions -->

            <div
                id="mediaFooter"
                class="border-t border-zinc-800 p-3 flex justify-end">

                <button
                    class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm">

                    Delete

                </button>

            </div>

        </div>


        <!-- Bottom Controls -->

        <div class="absolute bottom-0 left-0 right-0">

            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">

                <p class="text-xs uppercase tracking-wider text-zinc-500 mb-4">
                    Capture Controls
                </p>

                <div class="grid grid-cols-3 gap-3">

                    <!-- Video -->

                    <button id="videoBtn"
                        class="h-20 rounded-xl bg-red-600 hover:bg-red-500 transition flex flex-col items-center justify-center">

                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-6 h-6 mb-1"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="1.8"
                                d="M15 10l4-2v8l-4-2v2H5V8h10v2z"/>

                        </svg>

                        <span id="videoLabel" class="text-xs font-medium">
                            Video
                        </span>

                    </button>


                    <!-- Capture -->

                    <button
                        class="h-20 rounded-xl bg-white text-black hover:bg-zinc-200 transition flex flex-col items-center justify-center shadow">

                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-6 h-6 mb-1"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="1.8"
                                d="M3 7h4l2-2h6l2 2h4v12H3V7z"/>

                        </svg>

                        <span class="text-xs font-semibold">
                            Capture
                        </span>

                    </button>


                    <!-- Freeze -->

                    <button
                        class="h-20 rounded-xl bg-zinc-700 hover:bg-zinc-600 transition flex flex-col items-center justify-center">

                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-6 h-6 mb-1"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="1.8"
                                d="M10 9v6m4-6v6M6 5h12v14H6z"/>

                        </svg>

                        <span class="text-xs">
                            Freeze
                        </span>

                    </button>

                </div>

            </div>

        </div>

    </div>

</main>

<script>

// ---------- Scope Dropdown ----------

const scopeBtn = document.getElementById("scopeBtn");
const scopeMenu = document.getElementById("scopeMenu");
const scopeArrow = document.getElementById("scopeArrow");

scopeBtn.addEventListener("click", function(e){

    e.stopPropagation();

    scopeMenu.classList.toggle("hidden");

    scopeArrow.classList.toggle("rotate-180");

});

document.addEventListener("click", function(){

    scopeMenu.classList.add("hidden");

    scopeArrow.classList.remove("rotate-180");

});

scopeMenu.addEventListener("click", function(e){

    e.stopPropagation();

});

</script>

</body>
</html>
