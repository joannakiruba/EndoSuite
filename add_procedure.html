<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Procedure - EndoSuite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <header class="bg-teal-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-3xl flex items-center gap-4">
            <a href="dashboard.html" class="opacity-70 hover:opacity-100 transition-opacity">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <h1 class="text-xl font-semibold">New Procedure Entry</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-3xl mt-8">
        <form id="procedure-form" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Procedure Type</label>
                    <select id="procedure-type" class="w-full border border-gray-200 rounded-lg p-3 bg-white focus:ring-2 focus:ring-teal-500 outline-none">
                        <option value="Gastroscopy">Gastroscopy</option>
                        <option value="Colonoscopy">Colonoscopy</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="status" class="w-full border border-gray-200 rounded-lg p-3 bg-white focus:ring-2 focus:ring-teal-500 outline-none">
                        <option value="Draft">Draft</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                        <option value="Review">Pending Review</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-3">Observation Gallery</label>
                <div class="grid grid-cols-3 md:grid-cols-4 gap-4">
                    <div class="aspect-square bg-slate-50 border-2 border-dashed border-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                        <span class="text-xs">No media</span>
                    </div>
                    <label class="aspect-square bg-teal-50 border-2 border-dashed border-teal-200 rounded-lg flex flex-col items-center justify-center text-teal-700 hover:bg-teal-100 cursor-pointer transition-all">
                        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span class="text-[10px] font-medium uppercase tracking-wider">Import</span>
                        <input type="file" class="hidden" multiple accept="image/*,video/*">
                    </label>
                </div>
            </div>

            <div class="flex gap-4 pt-4 border-t">
                <button type="button" onclick="window.location.href='dashboard.html'" class="flex-1 py-3 px-4 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50 transition-all">Cancel</button>
                <button type="submit" class="flex-1 py-3 px-4 bg-teal-700 hover:bg-teal-800 text-white rounded-lg font-medium transition-all shadow-lg shadow-teal-700/20">Save Procedure</button>
            </div>
        </form>
    </main>
    <script>
        document.getElementById('procedure-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
