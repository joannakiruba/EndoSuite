<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Patient - EndoSuite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-teal-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-2xl flex items-center gap-4">
            <a href="dashboard.html" class="opacity-70 hover:opacity-100 transition-opacity">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <h1 class="text-xl font-semibold">Register New Patient</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-2xl mt-8 pb-20">
        <form id="registration-form" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 space-y-6">
            
            <!-- Locked MRN -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">MRN Number</label>
                <input type="text" id="mrn" readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-gray-500 cursor-not-allowed">
            </div>

            <!-- Mandatory Fields -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Patient Name <span class="text-red-500">*</span></label>
                    <input type="text" id="patient-name" required class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age <span class="text-red-500">*</span></label>
                    <input type="number" id="age" required class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Sex <span class="text-red-500">*</span></label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer border p-3 rounded-lg flex-1 justify-center hover:bg-slate-50">
                        <input type="radio" name="sex" value="Male" required class="text-teal-600"> Male
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer border p-3 rounded-lg flex-1 justify-center hover:bg-slate-50">
                        <input type="radio" name="sex" value="Female" required class="text-teal-600"> Female
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer border p-3 rounded-lg flex-1 justify-center hover:bg-slate-50">
                        <input type="radio" name="sex" value="Other" required class="text-teal-600"> Other
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mobile No. <span class="text-red-500">*</span></label>
                <input type="tel" id="mobile" required class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <!-- Non-Mandatory Fields -->
            <div class="space-y-4 pt-4 border-t">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ABHA ID</label>
                        <input type="text" id="abha" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <textarea id="address" rows="2" class="w-full border border-gray-200 rounded-lg p-2.5"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Referring Physician</label>
                        <input type="text" id="physician" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Internal Ref ID</label>
                        <input type="text" id="ref-id" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                </div>
            </div>

            <div class="flex gap-4 pt-6">
                <button type="button" onclick="window.location.href='dashboard.html'" class="flex-1 py-3 px-4 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50 transition-all">Cancel</button>
                <button type="submit" class="flex-1 py-3 px-4 bg-teal-700 hover:bg-teal-800 text-white rounded-lg font-medium transition-all">Register Patient</button>
            </div>
        </form>
    </main>

    <script>
        // Initialize MRN
        const mrnInput = document.getElementById('mrn');
        let currentMrn = parseInt(localStorage.getItem('last_mrn_index') || '0');
        currentMrn++;
        mrnInput.value = `MRN-${currentMrn.toString().padStart(4, '0')}`;

        document.getElementById('registration-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newPatient = {
                mrn: mrnInput.value,
                name: document.getElementById('patient-name').value,
                age: document.getElementById('age').value,
                sex: document.querySelector('input[name="sex"]:checked').value,
                mobile: document.getElementById('mobile').value,
                email: document.getElementById('email').value,
                abha: document.getElementById('abha').value,
                address: document.getElementById('address').value,
                physician: document.getElementById('physician').value,
                refId: document.getElementById('ref-id').value
            };

            // Save to LocalStorage
            const patients = JSON.parse(localStorage.getItem('patients') || '[]');
            patients.push(newPatient);
            localStorage.setItem('patients', JSON.stringify(patients));
            localStorage.setItem('last_mrn_index', currentMrn);

            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
