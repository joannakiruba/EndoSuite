<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings - EndoSuite</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family: Segoe UI, sans-serif;
}
</style>

</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="bg-teal-900 text-white shadow">

    <div class="max-w-7xl mx-auto px-6 py-4">

        <div class="flex items-center gap-3">

            <a href="dashboard.html"
                class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-teal-800 transition-colors"
                title="Back to Dashboard">

                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-6 h-6"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24">

                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M15 19l-7-7 7-7"/>

                    </svg>

                </a>

            <h1 class="text-lg font-semibold">
                EndoSuite Settings
            </h1>

        </div>

    </div>

</header>

<!-- MAIN -->
<main class="max-w-7xl mx-auto p-6 space-y-6">
    <div class="flex justify-end">

        <button
            class="bg-black text-white rounded-lg px-4 py-2 text-sm">
            Save Settings
        </button>

    </div>
    <div class="grid grid-cols-2 gap-6">

    <!-- USER PROFILE -->
        <div class="bg-white rounded-xl border shadow-sm p-6">

            <h2 class="text-sm font-semibold text-teal-800 mb-5">
                User Profile
            </h2>

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm mb-1">Name</label>
                    <input type="text" value="Dr. John Doe"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">Degree</label>
                    <input type="text" value="MBBS, MD"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">Speciality</label>
                    <input type="text" value="Gastroenterology"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">Mobile</label>
                    <input type="text" value="+91 9876543210"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">Email</label>
                    <input type="email" value="doctor@endosuite.com"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">
                        Procedure Warning Time (mins)
                    </label>
                    <input type="number" value="10"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

            </div>

            <!-- SIGNATURE -->
            <div class="mt-6">

                <label class="block text-sm mb-2">
                    Digital Signature
                </label>

                <div class="border rounded-lg p-4 bg-slate-50">

                    <div class="h-20 flex items-center justify-center border border-dashed rounded-lg text-gray-400 text-sm">
                        Signature Preview
                    </div>

                    <button
                        class="mt-3 px-4 py-2 text-sm bg-gray-200 rounded-lg hover:bg-gray-300">
                        Upload New Signature
                    </button>

                </div>

            </div>

        </div>

        <!-- CLINIC -->
        <div class="bg-white rounded-xl border shadow-sm p-6">

            <h2 class="text-sm font-semibold text-teal-800 mb-5">
                Clinic / Organization
            </h2>

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm mb-1">
                        Clinic Name
                    </label>
                    <input type="text" value="EndoSuite Hospital"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">
                        Mobile
                    </label>
                    <input type="text" value="+91 9876543210"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div class="col-span-2">
                    <label class="block text-sm mb-1">
                        Address
                    </label>
                    <textarea rows="3"
                        class="w-full border rounded-lg px-3 py-2 text-sm">123 Medical Street, Chennai</textarea>
                </div>

                <div>
                    <label class="block text-sm mb-1">
                        Email
                    </label>
                    <input type="email" value="info@endosuite.com"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">
                        Website
                    </label>
                    <input type="text" value="www.endosuite.com"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

            </div>

            <!-- LOGO -->
            <div class="mt-6">

                <label class="block text-sm mb-2">
                    Clinic Logo
                </label>

                <div class="border rounded-lg p-4 bg-slate-50 inline-block">

                    <div class="w-24 h-24 mx-auto flex items-center justify-center border border-dashed rounded-lg text-gray-400 text-xs">
                        Logo Preview
                    </div>

                    <button
                        class="mt-3 w-full px-3 py-2 text-sm bg-gray-200 rounded-lg hover:bg-gray-300">
                        Upload Logo
                    </button>

                </div>

            </div>

        </div>
    </div>

    <!-- SECURITY -->
    <div class="bg-white rounded-xl border shadow-sm p-6">

        <h2 class="text-sm font-semibold text-teal-800 mb-5">
            Security
        </h2>

        <button
            onclick="document.getElementById('resetPinSection').classList.remove('hidden')"
            class="px-4 py-2 bg-black text-white rounded-lg text-sm">
            Reset PIN
        </button>

        <div id="resetPinSection" class="hidden mt-5">

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm mb-1">
                        Security Question
                    </label>

                    <input type="text"
                        placeholder="What is your favourite teacher's name?"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

                <div>
                    <label class="block text-sm mb-1">
                        Security Answer
                    </label>

                    <input type="text"
                        placeholder="Enter answer"
                        class="w-full border rounded-lg px-3 py-2 text-sm">
                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
