<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Editor - EndoSuite</title>
<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=0PHnanRxe5gUpqp0oI9Ea-x4bXdCY3B0xuiDx5AqMh-suqgVHJ-zoS6D0cvXkr187n-hhi6Ojnh3VRKAbJjr9Uqx8gtUU8Q1xxaN4jS105BVOGT5W3MqZx1ca3WRN-KqpRJUCTTbDSGLJRONE6IG0QtLpr16xQW7HqHvt8otTi4DebqVv02d3uAUTxLci-eSL_DSJ_DQBfX0EZyycm7603eiGBMdAyxDHUcQ7TS_BDV-8nqPolksZqy2OWRHF2CosSAAoFt1eU05az1pkslCWA" charset="UTF-8"></script><script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Segoe UI,sans-serif}
#layout{transition:grid-template-columns .35s ease}
#tablePane{transition:all .35s ease}
#previewPane{transition:all .35s ease;opacity:0;transform:translateX(30px);pointer-events:none}
#layout.active{grid-template-columns:35% 65%}
#layout.active #previewPane{opacity:1;transform:none;pointer-events:auto}
.sel{background:#f0fdfa;border-left:4px solid #0f766e}
</style></head>
<body class="bg-slate-100">
<header class="bg-teal-900 text-white p-4 shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center gap-4">

        <a href="dashboard.html"
           class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-teal-800 transition-colors"
           title="Back to Dashboard">

            <svg xmlns="http://www.w3.org/2000/svg"
                 class="w-6 h-6"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 19l-7-7 7-7"/>

            </svg>

        </a>

        <h1 class="text-xl font-semibold">
            Template Editor
        </h1>

    </div>
</header>
<div class="max-w-7xl mx-auto p-6">
<div id="layout" class="grid grid-cols-1 gap-6">
<div id="tablePane" class="bg-white rounded-xl shadow border overflow-hidden">
<table class="w-full">
<thead class="bg-slate-50 text-xs uppercase text-gray-500"><tr><th class="p-4 text-left">Procedure</th><th class="p-4">Type</th><th class="p-4">Updated</th><th class="p-4">Edit</th></tr></thead>
<tbody id="rows"></tbody></table></div>
<div id="previewPane" class="bg-white rounded-xl shadow border p-6">
    <div class="flex justify-between items-center mb-4">
        <button onclick="closePreview()"
            class="flex items-center gap-2 text-sm font-medium text-teal-700 hover:text-teal-900">
            <svg xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Templates
        </button>
    </div>
<h2 class="text-xl font-bold text-teal-800 mb-4">Template Preview</h2>
<div class="border rounded-lg p-6 bg-slate-50">
<div class="text-center font-bold text-lg">Hospital Header</div><hr class="my-4">
<p><b>Procedure:</b> <span id="proc"></span></p>
<div class="mt-4 border rounded p-3 bg-white"><b>Clinical Observations</b><div class="text-gray-500 mt-2">[ Findings appear here ]</div></div>
<div class="mt-4 border rounded p-3 bg-white"><b>Advice & Prescription</b><div class="text-gray-500 mt-2">[ Advice appears here ]</div></div>
<div class="mt-8 text-right">Doctor Signature</div>
</div>
</div></div></div>
<script>
const data=[
["Gastroscopy","PRE-BUILT","12 Jun 2026"],
["Colonoscopy","PRE-BUILT","10 Jun 2026"],
["ERCP","CUSTOM","08 Jun 2026"],
["Sigmoidoscopy","CUSTOM","03 Jun 2026"],
["Bronchoscopy","PRE-BUILT","01 Jun 2026"],
["Capsule Endoscopy","CUSTOM","29 May 2026"],
["Endoscopic Ultrasound (EUS)","CUSTOM","25 May 2026"],
["Stent Placement","CUSTOM","20 May 2026"]
];
const tb=document.getElementById("rows");
data.forEach((r,i)=>{
let chip=r[1]=="PRE-BUILT"?
'<span class="px-2 py-1 rounded-full bg-teal-100 text-teal-800 text-xs font-semibold">PRE-BUILT</span>':
'<span class="px-2 py-1 rounded-full bg-indigo-100 text-indigo-800 text-xs font-semibold">CUSTOM</span>';
tb.innerHTML+=`<tr id="r${i}"
    onclick="view(${i})"
    class="border-t cursor-pointer hover:bg-teal-50 transition-all duration-200">
<td class="p-4 font-semibold">${r[0]}</td>
<td class="p-4">${chip}</td>
<td class="p-4">${r[2]}</td>
<td class="p-4">
    <div class="flex justify-center items-center">
<button
    title="Edit"
    onclick="event.stopPropagation(); alert('Template editor is not implemented in Demo Mode.');"
    class="text-blue-700 hover:text-blue-900 transition-colors">

    <svg xmlns="http://www.w3.org/2000/svg"
         class="w-5 h-5"
         fill="none"
         stroke="currentColor"
         viewBox="0 0 24 24">

        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16.862 3.487a2.1 2.1 0 113 2.97L7 19.32 3 20l.68-4z"/>

    </svg>

</button>
</div>
</td></tr>`
});
function view(i){
document.getElementById("layout").classList.add("active");
document.querySelectorAll("tbody tr").forEach(x=>x.classList.remove("sel"));
document.getElementById("r"+i).classList.add("sel");
document.getElementById("proc").textContent=data[i][0];
let th=document.querySelector("thead tr");
th.children[1].style.display="none";th.children[2].style.display="none";
document.querySelectorAll("tbody tr").forEach(tr=>{tr.children[1].style.display="none";tr.children[2].style.display="none";});
}
function closePreview() {

    // Restore full-width layout
    document.getElementById("layout").classList.remove("active");

    // Remove selected row highlight
    document.querySelectorAll("tbody tr").forEach(tr => {
        tr.classList.remove("sel");
    });

    // Show hidden columns again
    const headers = document.querySelector("thead tr").children;

    headers[1].style.display = "";
    headers[2].style.display = "";

    document.querySelectorAll("tbody tr").forEach(tr => {
        tr.children[1].style.display = "";
        tr.children[2].style.display = "";
    });

}
</script>
</body></html>
