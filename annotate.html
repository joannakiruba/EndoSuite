    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Procedure</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0d1117;
}
</style>

</head>

<body class="bg-[#0d1117] text-white min-h-screen">

    <!-- ================= HEADER ================= -->

<header class="bg-zinc-900 border-b border-zinc-800 px-8 py-4">

    <div class="flex items-center justify-between">

        <!-- Left -->

        <div class="flex items-center gap-10">

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    Patient
                </p>

                <p id="patientName"
                   class="text-base font-semibold">
                    John Doe
                </p>
            </div>

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    Age / Sex
                </p>

                <p id="patientAge"
                   class="text-sm text-zinc-300">
                    52 Years • Male
                </p>
            </div>

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    MRN no.
                </p>
                <p class="text-sm text-zinc-300">
                    MRN-0001
                </p>
            </div>

            <div>
                <p class="text-[11px] uppercase tracking-wider text-zinc-500">
                    Procedure
                </p>

                <p id="procedureName"
                   class="text-sm text-base font-medium">
                    Gastroscopy
                </p>
            </div>

        </div>

        <!-- Right -->

        <div class="flex items-center gap-3">

            <button
                onclick="window.location.href='report.html'"
                class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 transition text-sm font-medium">

                Finish

            </button>

            <a href="procedure.html"
               class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 transition text-sm font-medium">

                Live Procedure

            </a>

            <a href="dashboard.html"
               class="px-4 py-2 rounded-lg bg-zinc-700 border border-zinc-600 hover:bg-zinc-600 transition text-sm font-medium">

                Return to Dashboard

            </a>

        </div>

    </div>

</header>

<!-- ================= MAIN ================= -->

<main class="flex h-[calc(100vh-81px)]">

    <!-- ================= LEFT (2/3) ================= -->
    <section class="flex-[2] bg-zinc-950 relative border-r border-zinc-800 flex items-center justify-center">

        <!-- Canvas Wrapper -->
        <div class="w-[95%] h-[92%] relative flex flex-col items-center justify-start">

            <!-- Image/Video Canvas -->
            <div class="w-full h-full rounded-xl border-2 border-dashed border-zinc-700 bg-zinc-900 flex items-center justify-center relative">

                <p class="text-zinc-500 text-lg">
                    Selected Image / Video
                </p>

                <!-- ================= FLOATING TOOLBAR ================= -->
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2">

                    <div class="bg-zinc-900/95 backdrop-blur border border-zinc-700 rounded-xl p-2 shadow-lg flex items-center gap-2">

                        <!-- Cursor -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center">
                            <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-white">
                                <path d="M5 3v18l4-4 3 7 2-1-3-7h6L5 3z"/>
                            </svg>
                        </button>

                        <!-- Arrow -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white text-lg">
                            ↗
                        </button>

                        <!-- Circle -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white text-lg">
                            ◯
                        </button>

                        <!-- Rectangle -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white text-lg">
                            ▭
                        </button>

                        <!-- Pen -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white text-lg">
                            ✎
                        </button>

                        <!-- Text -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white font-bold">
                            T
                        </button>

                        <!-- Undo -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white text-lg">
                            ↶
                        </button>

                        <!-- Redo -->
                        <button class="w-10 h-10 rounded-lg bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-white text-lg">
                            ↷
                        </button>

                        <!-- RESET -->
                        <button class="w-10 h-10 rounded-lg bg-red-600 hover:bg-amber-500 flex items-center justify-center"
                                title="Reset Canvas">

                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" class="w-5 h-5 text-white">

                                <path d="M21 12a9 9 0 1 1-3-6.7"/>
                                <path d="M21 3v6h-6"/>

                            </svg>

                        </button>

                    </div>

                </div>
                <!-- ================= END TOOLBAR ================= -->

            </div>

        </div>

    </section>

    <!-- ================= RIGHT (1/3) ================= -->
    <aside class="flex-[1] bg-zinc-900 border-l border-zinc-800 flex flex-col p-4 gap-4">

        <!-- MEDIA PANEL -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden flex-1 flex flex-col">

            <!-- Tabs -->
            <div class="flex border-b border-zinc-800">

                <button class="flex-1 py-3 text-sm font-medium bg-zinc-800 text-white">
                    Images
                </button>

                <button class="flex-1 py-3 text-sm text-zinc-400 hover:text-white">
                    Videos
                </button>

                <button class="flex-1 py-3 text-sm text-zinc-400 hover:text-white">
                    Bin
                </button>

            </div>

            <!-- Content -->
            <div class="flex-1 bg-black p-4 flex items-center justify-center">
                <p class="text-zinc-500 text-sm">No media captured</p>
            </div>

            <!-- Footer -->
            <div class="border-t border-zinc-800 p-3 flex justify-end gap-2">
                <button class="px-3 py-2 rounded-lg bg-zinc-700 hover:bg-zinc-600 text-sm">
                    Select All
                </button>

                <button class="px-3 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-sm">
                    Delete
                </button>
            </div>

        </div>

        <!-- IMAGE ADJUSTMENTS (your existing block) -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">

            <h3 class="text-sm font-semibold text-white mb-4">
                Image Adjustments
            </h3>

            <div class="mb-4">
                <div class="flex justify-between text-xs text-zinc-400 mb-1">
                    <span>Brightness</span><span>50%</span>
                </div>
                <input type="range" class="w-full accent-emerald-500">
            </div>

            <div class="mb-4">
                <div class="flex justify-between text-xs text-zinc-400 mb-1">
                    <span>Contrast</span><span>50%</span>
                </div>
                <input type="range" class="w-full accent-emerald-500">
            </div>

            <div>
                <div class="flex justify-between text-xs text-zinc-400 mb-1">
                    <span>Saturation</span><span>50%</span>
                </div>
                <input type="range" class="w-full accent-emerald-500">
            </div>

        </div>

    </aside>

</main>

<script>
// Optional: automatically load selected patient/procedure
// if procedure.html saved them in localStorage.

const patientName = localStorage.getItem("patientName");
const patientAge = localStorage.getItem("patientAge");
const procedureName = localStorage.getItem("procedureName");

if (patientName)
    document.getElementById("patientName").textContent = patientName;

if (patientAge)
    document.getElementById("patientAge").textContent = patientAge;

if (procedureName)
    document.getElementById("procedureName").textContent = procedureName;
</script>

</body>
</html>
